name: timetable
description: "A new Flutter project."
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.0
  flutter_colorpicker: ^1.0.3
  http: ^1.2.1
  url_launcher: ^6.3.1
  flutter_local_notifications: ^17.1.0
  timezone: ^0.9.4
  intl: ^0.19.0
  provider: ^6.1.2
  flutter_timezone: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "resources/images/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
